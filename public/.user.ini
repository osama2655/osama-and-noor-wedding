; Per-directory PHP overrides (php-fpm reads this from the docroot). Raised so
; the catalog file uploads (quotes, decks, videos) can reach 120 MB per file.
; upload_max_filesize / post_max_size are PHP_INI_PERDIR, so this takes effect
; without touching the global php.ini. nginx client_max_body_size is raised to
; match in the site's server block.
upload_max_filesize = 130M
post_max_size = 135M
max_file_uploads = 20
